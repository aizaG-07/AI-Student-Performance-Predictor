<!DOCTYPE html>
<html lang="en">
<head>
    <title>Prediction Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
        }

        .card {
            border-radius: 20px;
            background: linear-gradient(to right, #764ba2, #667eea);

        }

        .navbar {
            background: rgba(0,0,0,0.2);
        }
       
        .btn-custom {
            background: #ff6a00;
            color: white;
            font-weight: bold;
        }

        .btn-custom:hover {
            background: #ff8500;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🎓 Student System</span>

    <div>
        <a href="/" class="btn btn-dark btn-sm">Home</a>
        <a href="/predict_page" class="btn btn-dark btn-sm">Predict</a>
        <a href="/history" class="btn btn-dark btn-sm">History</a>
         {% if current_user.is_admin %}
        <a href="/admin" class="btn btn-dark btn-sm">Admin</a>
        {% endif %}
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<!-- Navbar -->
<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand">🎓 AI Predictor</span>
</nav>

<!-- Main -->
<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-6">
            <div class="card p-4 shadow-lg">

                <h3 class="text-center mb-4">Enter Student Details</h3>

                <form action="/predict" method="post">

                    <input type="text" name="student_id" placeholder="Student ID" class="form-control mb-3" required>
                    <input type="text" name="student_name" placeholder="Student Name" class="form-control mb-3" required>
                    <input type="number" name="hours" placeholder="Hours Studied" class="form-control mb-3" required>
                    <input type="number" name="attendance" placeholder="Attendance (%)" class="form-control mb-3" required>
                    <input type="number" name="sleep" placeholder="Sleep Hours" class="form-control mb-3" required>
                    <input type="number" name="study" placeholder="Weekly Study Hours" class="form-control mb-3" required>
                    <input type="number" name="score" placeholder="Total Score" class="form-control mb-3" required>

                    <button type="submit" class="btn btn-custom w-100">
                        Predict 🚀
                    </button>

                </form>

                {% if prediction_text %}
                <div class="alert alert-success mt-4 text-center">
                    <h4>{{ prediction_text }}</h4>
                </div>
                {% endif %}

            </div>
        </div>

    </div>
</div>

</body>
</html>
