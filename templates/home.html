<!DOCTYPE html>
<html lang="en">
<head>
    <title>AI Student Predictor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            margin: 0;
            color: white;
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
.btn-getstarted {
    background: linear-gradient(45deg, #ffcc00, #ffe600);
    color: white;
    border: none;
    padding: 10px 25px;
    border-radius: 30px;
    font-weight: bold;
}

.btn-login {
    background: #e9ecef;
    color: #333;
    border: none;
    padding: 10px 25px;
    border-radius: 30px;
    font-weight: bold;
}

/* HOVER EFFECT */
.btn-getstarted:hover,
.btn-login:hover {
    transform: scale(1.05);
    transition: 0.2s;
}

    </style>
</head>

<body>

<div class="hero">
    <div class="glass">
        <h1 class="mb-3">🎓 AI Student Predictor</h1>
        <p class="mb-4">Predict student performance using Machine Learning</p>

      <div class="text-center mt-4">

    <a href="/predict_page" class="btn btn-getstarted me-3">
        🚀 Get Started
    </a>

    <a href="/login" class="btn btn-login">
        🔑 Login
    </a>

</div>
    </div>
</div>

</body>
</html>
