<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<style>
   body {
    background: linear-gradient(to right, #667eea, #764ba2);
}

/* Glass container */
.table-container {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* REMOVE WHITE FROM TABLE + CELLS */
.table,
.table th,
.table td {
    background-color: transparent !important;
    color: white !important;
    border-color: rgba(255,255,255,0.2) !important;
}

/* HEADER */
.table thead {
    background: rgba(0, 0, 0, 0.4) !important;
}

/* HOVER EFFECT */
.table tbody tr:hover {
    background-color: rgba(255,255,255,0.1) !important;
}

/* BADGES */
.badge-pass {
    background-color: #28a745;
    padding: 6px 12px;
    border-radius: 10px;
    color: white;
}

    .badge-fail {
        background-color: #dc3545;
        padding: 6px 10px;
        border-radius: 10px;
        color: white;
    }
</style>

<body>
   <nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🎓 Student System</span>

    <div>
        <a href="/" class="btn btn-dark btn-sm">Home</a>
        <a href="/predict_page" class="btn btn-dark btn-sm">Predict</a>
        <a href="/history" class="btn btn-dark btn-sm">History</a>
         {% if current_user.is_admin %}
        <a href="/admin" class="btn btn-dark btn-sm">Admin</a>
        {% endif %}
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>
<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand">Admin</span>
</nav>
<div class="table-container">

<table class="table table-bordered text-center align-middle">

<tbody>
{% for p in predictions %}
<tr>
    <td>{{ p.student_id }}</td>
    <td>{{ p.student_name }}</td>
    <td>{{ p.score }}</td>

    <td>
        <!-- VIEW BUTTON -->
        <a href="/view/{{ p.id }}" class="btn btn-primary btn-sm">👁 View</a>

        <!-- DELETE BUTTON -->
        <a href="/delete/{{ p.id }}" class="btn btn-danger btn-sm"
           onclick="return confirm('Are you sure?')">🗑 Delete</a>
    </td>
</tr>
{% endfor %}
</tbody>
</table>

</div>

</body>
</html>
